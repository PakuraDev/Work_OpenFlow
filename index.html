<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenFlow_V3</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>

    <header class="cmd-bar">
        <div class="brand">
            <span class="status-dot"></span>
            <h1>OpenFlow_V3</h1>
        </div>

        <a href="https://www.youtube.com/@ninopolis420" target="_blank" class="artist-link" style="
            font-family: var(--font-mono); 
            font-size: 0.8rem; 
            color: var(--ink); 
            text-decoration: none; 
            border-bottom: 1px dashed var(--alert);
            padding-bottom: 2px;">
            Un artista pequeño que me encanta, darle amor &lt;3
        </a>
        
        <div class="toolbar">
            <input type="search" id="search-filter" placeholder="Buscar..." style="
                margin: 0; 
                padding: 5px 10px; 
                width: 180px; 
                background: transparent; 
                border: 1px solid var(--ink); 
                color: var(--ink); 
                font-family: var(--font-mono); 
                font-size: 0.8rem;">

            <button id="btn-view-board" class="btn btn-acid active">[ TABLERO ]</button>
            <button id="btn-view-gantt" class="btn btn-outline">[ CRONOGRAMA ]</button>
            
            <span class="separator">|</span>
            
            <button id="btn-epics" class="btn btn-text">GESTIONAR FASES</button>
            <button id="btn-import" class="btn btn-text">IMPORTAR</button>
            <button id="btn-export" class="btn btn-text">EXPORTAR</button>
            <button id="btn-add-task" class="btn btn-solid">+ NUEVA TAREA</button>
        </div>
    </header>

    <main id="app-container">
        
        <div id="board-view" class="board-grid">
            </div>

        <div id="gantt-view" class="hidden">
            <div class="gantt-controls">
                 <span class="terminal-text">> RENDER_MODE: CHRONOLOGICAL</span>
            </div>
            <div id="gantt-chart"></div>
        </div>

    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-window">
            <div class="modal-header">
                <h2 id="modal-title">INPUT_REQUIRED</h2>
                <button id="btn-close-modal" class="close-x">X</button>
            </div>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/frappe-gantt/0.6.1/frappe-gantt.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
